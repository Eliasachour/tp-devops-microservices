name: Deploy Microservices with Helm

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build discovery-service
        run: |
          cd discovery-service
          mvn clean install -DskipTests

      - name: Build config-service
        run: |
          cd config-service
          mvn clean install -DskipTests

      - name: Build catalogue-service
        run: |
          cd catalogue-service
          mvn clean install -DskipTests

      - name: Build commande-service
        run: |
          cd commande-service
          mvn clean install -DskipTests

      - name: Build paiement-service
        run: |
          cd paiement-service
          mvn clean install -DskipTests

      - name: Build gateway-service
        run: |
          cd gateway-service
          mvn clean install -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push discovery-service
        run: |
          docker build -t eliascmoi0192837465/discovery-service:latest ./discovery-service
          docker push eliascmoi0192837465/discovery-service:latest

      - name: Build and push config-service
        run: |
          docker build -t eliascmoi0192837465/config-service:latest ./config-service
          docker push eliascmoi0192837465/config-service:latest

      - name: Build and push catalogue-service
        run: |
          docker build -t eliascmoi0192837465/catalogue-service:latest ./catalogue-service
          docker push eliascmoi0192837465/catalogue-service:latest

      - name: Build and push commande-service
        run: |
          docker build -t eliascmoi0192837465/commande-service:latest ./commande-service
          docker push eliascmoi0192837465/commande-service:latest

      - name: Build and push paiement-service
        run: |
          docker build -t eliascmoi0192837465/paiement-service:latest ./paiement-service
          docker push eliascmoi0192837465/paiement-service:latest

      - name: Build and push gateway-service
        run: |
          docker build -t eliascmoi0192837465/gateway-service:latest ./gateway-service
          docker push eliascmoi0192837465/gateway-service:latest

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Deploy discovery-service with Helm
        run: helm upgrade --install discovery-service ./charts/discovery-service

      - name: Deploy config-service with Helm
        run: helm upgrade --install config-service ./charts/config-service

      - name: Deploy catalogue-service with Helm
        run: helm upgrade --install catalogue-service ./charts/catalogue-service

      - name: Deploy commande-service with Helm
        run: helm upgrade --install commande-service ./charts/commande-service

      - name: Deploy paiement-service with Helm
        run: helm upgrade --install paiement-service ./charts/paiement-service

      - name: Deploy gateway-service with Helm
        run: helm upgrade --install gateway-service ./charts/gateway-service